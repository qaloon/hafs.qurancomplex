        const storageKey = 'last_page_' + "مصحف المدينة - رواية حفص".replace(/s+/g, '_');
        let currentIndex = 0;
        let zoomLevel = 100;
        const container = document.getElementById('book-container');
        const zoomWrapper = document.getElementById('zoom-wrapper');
        const pageNumberDisplay = document.getElementById('page-number');
        const zoomDisplay = document.getElementById('zoom-level');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsMenu = document.getElementById('settingsMenu');

        function createPageElement(url, index) {
            const wrapper = document.createElement('div');
            wrapper.className = 'page-wrapper';
            wrapper.id = 'page-' + index;
            
            const img = document.createElement('img');
            img.src = url;
            img.alt = "مصحف المدينة - رواية حفص - صفحة " + (index + 1);
            img.referrerPolicy = "no-referrer";
            img.className = 'book-page-img opacity-0';
            img.loading = index < 3 ? "eager" : "lazy";
            img.onload = () => { img.classList.remove('opacity-0'); };
            
            wrapper.appendChild(img);
            return wrapper;
        }

        function init() {
            if (document.getElementById('loader')) document.getElementById('loader').remove();
            
            // 1. تحميل أول 3 صفحات فوراً (التركيز الأساسي)
            const initialPages = rawImages.slice(0, 3);
            initialPages.forEach((url, index) => {
                container.appendChild(createPageElement(url, index));
            });

            // 2. تحميل بقية الصفحات في الخلفية (Buffer) بعد تأخير بسيط
            setTimeout(() => {
                const remainingPages = rawImages.slice(3);
                remainingPages.forEach((url, index) => {
                    container.appendChild(createPageElement(url, index + 3));
                });
                
                // تفعيل المراقب بعد تحميل كافة العناصر
                setupObserver();
                
                // العودة لآخر صفحة مقروءة إذا وجدت
                const savedPage = localStorage.getItem(storageKey);
                if (savedPage) {
                    const target = document.getElementById('page-' + savedPage);
                    if (target) {
                        setTimeout(() => {
                            window.scrollTo({ top: target.offsetTop - 80, behavior: 'smooth' });
                        }, 500);
                    }
                }
            }, 1000);
        }

        function setupObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        currentIndex = parseInt(entry.target.id.split('-')[1]);
                        pageNumberDisplay.textContent = currentIndex + 1;
                        // حفظ الصفحة الحالية في الكاش المحلي
                        localStorage.setItem(storageKey, currentIndex);
                    }
                });
            }, { threshold: 0.2 });
            document.querySelectorAll('.page-wrapper').forEach(el => observer.observe(el));
        }

        function adjustZoom(delta) {
            zoomLevel = Math.max(50, Math.min(200, zoomLevel + delta));
            zoomWrapper.style.maxWidth = zoomLevel + '%';
            zoomWrapper.style.width = zoomLevel + '%';
            zoomDisplay.textContent = zoomLevel + '%';
        }

        function toggleLayout() {
            container.classList.toggle('double-page');
            settingsMenu.classList.add('hidden-menu');
        }

        function changeTheme(theme) {
            document.body.className = 'theme-' + theme + ' min-h-screen flex flex-col items-center pb-32';
            const colors = { light: '#ffffff', sepia: '#f4ecd8', dark: '#0a0a0a' };
            document.querySelector('meta[name="theme-color"]').setAttribute('content', colors[theme]);
            settingsMenu.classList.add('hidden-menu');
        }

        settingsBtn.onclick = (e) => { e.stopPropagation(); settingsMenu.classList.toggle('hidden-menu'); settingsMenu.classList.toggle('visible-menu'); };
        document.onclick = () => { settingsMenu.classList.add('hidden-menu'); settingsMenu.classList.remove('visible-menu'); };

        function scrollToNext() {
            const step = container.classList.contains('double-page') ? 2 : 1;
            const target = document.getElementById('page-' + (currentIndex + step));
            if (target) window.scrollTo({ top: target.offsetTop - 80, behavior: 'smooth' });
        }

        function scrollToPrev() {
            const step = container.classList.contains('double-page') ? 2 : 1;
            const target = document.getElementById('page-' + (currentIndex - step));
            if (target) window.scrollTo({ top: target.offsetTop - 80, behavior: 'smooth' });
        }

        function downloadPDF() {
            const pdfUrl = "https://dn711503.ca.archive.org/0/items/Hafs-HD/mumtaz-1.pdf";
            if (!pdfUrl || pdfUrl === "#") {
                alert("عذراً، رابط ملف الـ PDF غير متوفر حالياً.");
                return;
            }
            const link = document.createElement('a');
            link.href = pdfUrl;
            link.target = "_blank";
            link.download = "مصحف المدينة - رواية حفص.pdf";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.onload = init;
    </script>
